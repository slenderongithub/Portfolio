<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Shubhadeep Datta</title>
  <meta name="description" content="Contact Shubhadeep Datta for projects, collaborations, internships, and technical conversations." />
  <script>
    (function () {
      try {
        var theme = localStorage.getItem("portfolio-theme") || localStorage.getItem("theme");
        if (!theme && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
          theme = "dark";
        }
        document.documentElement.classList.add("theme-booting");
        if (theme === "dark") {
          document.documentElement.classList.add("theme-midnight");
        }
      } catch (error) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&family=Sora:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
  <style>
    :root {
      --accent: #1a9aaa;
      --accent-strong: #148898;
      --accent-soft: rgba(26, 154, 170, 0.14);


      --form-bg: #ffffff;
      --form-border: rgba(30, 40, 60, 0.11);
      --form-label: rgba(30, 40, 60, 0.45);
      --form-text: #1a2032;
      --form-input-focus: rgba(26, 154, 170, 0.05);
      --form-pill-hover: rgba(26, 154, 170, 0.06);
      --form-pill-on: rgba(26, 154, 170, 0.12);
      --form-header-bg: rgba(30, 40, 60, 0.035);
      --btn-text: #ffffff;
    }
    body.theme-midnight {
      --accent: #22d3ee;
      --accent-strong: #0891b2;
      --accent-soft: rgba(34, 211, 238, 0.16);

      --text: #f4f7fb;
      --muted: #94a3b8;

      --form-bg: #0a0d14;
      --form-border: rgba(34, 211, 238, 0.25);
      --form-label: rgba(244, 247, 251, 0.65);
      --form-text: #f8fafc;
      --form-input-focus: rgba(34, 211, 238, 0.05);
      --form-pill-hover: rgba(34, 211, 238, 0.06);
      --form-pill-on: rgba(34, 211, 238, 0.12);
      --form-header-bg: rgba(34, 211, 238, 0.035);
      --btn-text: #030508;
    }

    .contact-shell {
      width: min(100%, var(--content-max, 1140px));
      margin: 0 auto;
      padding: clamp(2rem, 6vh, 5rem) 0;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: clamp(2rem, 5vw, 4rem);
      align-items: center;
      justify-content: start;
      width: 100%;
      min-height: calc(100vh - 12rem);
    }
    @media (max-width: 1080px) {
      .contact-grid {
        grid-template-columns: 1fr;
        gap: 2.5rem;
        min-height: auto;
      }
    }

    .contact-hero {
      text-align: left;
      align-self: center;
      display: flex;
      flex-direction: column;
    }
    .contact-hero h1 {
      font-family: "DM Serif Display", serif;
      font-size: clamp(2.2rem, 5vw, 4.4rem);
      line-height: 1.06;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 1.15rem;
    }
    .contact-hero h1 span {
      color: var(--accent);
      font-style: italic;
    }
    .contact-desc {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.8;
      max-width: 44ch;
      margin-bottom: 1.5rem; /* 24px spacing */
    }
    .contact-ctas {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1.5rem; /* 24px spacing */
    }
    .status-badge {
      margin: 0;
      cursor: default;
      pointer-events: none;
    }
    .contact-grid-buttons {
      display: grid;
      grid-template-columns: repeat(2, 140px);
      gap: 0.6rem;
    }
    .contact-grid-buttons .hero-cta {
      width: 140px;
      margin: 0;
      box-sizing: border-box;
    }

    .form-wrap {
      background: var(--form-bg);
      border-radius: 12px;
      border: 1px solid var(--form-border);
      box-shadow:
        0 4px 16px rgba(0, 0, 0, 0.02),
        0 16px 48px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      width: 100%;
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }
    body.theme-midnight .form-wrap {
      box-shadow:
        0 20px 50px rgba(0, 0, 0, 0.45),
        0 0 40px rgba(34, 211, 238, 0.03);
    }


    .table-head {
      padding: 14px 24px;
      background: var(--form-header-bg);
      border-bottom: 1px solid var(--form-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .table-head-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    

    .form-card-dots {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    .form-card-dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: block;
      border: 1px solid rgba(0, 0, 0, 0.15);
    }
    body.theme-midnight .form-card-dots span {
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .form-card-dots span:nth-child(1) { background: #ff5f56; }
    .form-card-dots span:nth-child(2) { background: #ffbd2e; }
    .form-card-dots span:nth-child(3) { background: #27c93f; }

    .table-head-title {
      font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--form-label);
    }
    .table-head-cols {
      display: flex;
      gap: 32px;
    }
    .col-hint {
      font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
      font-size: 9px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--form-label);
      opacity: 0.7;
    }


    table {
      width: 100%;
      border-collapse: collapse;
    }
    tr {
      border-bottom: 1px solid var(--form-border);
      transition: background .18s ease;
    }
    tr:last-child {
      border-bottom: none;
    }
    tr:focus-within {
      background: var(--form-input-focus);
    }

    .td-label {
      padding: 20px 20px 20px 24px;
      width: 130px;
      min-width: 130px;
      border-right: 1px solid var(--form-border);
      vertical-align: top;
      padding-top: 22px;
    }
    .td-label span {
      font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
      font-size: 9.5px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--form-label);
      line-height: 1.8;
      display: block;
    }

    .td-input {
      padding: 16px 24px;
      vertical-align: middle;
    }


    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 2px 0;
    }
    .pill {
      padding: 6px 14px;
      border: 1px solid var(--form-border);
      border-radius: 999px;
      font-family: "Outfit", sans-serif;
      font-size: 12.5px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .pill:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--form-pill-hover);
    }
    .pill.on {
      border-color: var(--accent);
      background: var(--form-pill-on);
      color: var(--accent);
      font-weight: 500;
    }


    input[type=text],
    input[type=email],
    textarea {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-family: "Outfit", sans-serif;
      font-size: 14.5px;
      color: var(--form-text);
      caret-color: var(--accent);
      resize: none;
      line-height: 1.6;
      padding: 0;
    }
    input[type=text]::placeholder,
    input[type=email]::placeholder,
    textarea::placeholder {
      color: var(--muted);
      opacity: 0.6;
      font-size: 13.5px;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .hidden-honey {
      position: absolute;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }


    .send-row td {
      padding: 16px 20px 16px 24px;
      background: var(--form-header-bg);
      border-top: 1px solid var(--form-border);
    }
    .send-row .td-label span {
      color: var(--form-label);
      opacity: 0.5;
    }
    .send-cell {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
    }
    .char-count {
      font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: .06em;
      opacity: 0.7;
    }
    .send-btn {
      padding: 11px 26px;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--btn-text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
      transition: transform .2s ease, box-shadow .2s ease, background 0.2s ease;
    }
    .send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px var(--accent-soft);
    }
    .send-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.12);
      transform: translateX(-101%);
      transition: transform .38s ease;
    }
    .send-btn:hover::before {
      transform: translateX(0);
    }
    .arrow {
      font-family: sans-serif;
      font-size: 15px;
      transition: transform .2s ease;
    }
    .send-btn:hover .arrow {
      transform: translateX(4px);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 1.3rem;
      z-index: 20;
      transform: translate(-50%, 70px);
      opacity: 0;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #0b101a;
      color: #f8fafc;
      padding: 0.7rem 1rem;
      box-shadow: var(--shadow);
      font-size: 0.84rem;
      font-weight: 600;
      transition: transform 0.32s var(--ease), opacity 0.32s var(--ease);
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { transform: translate(-50%, 0); opacity: 1; }

    .page {
      width: min(calc(100% - 2.5rem), 1140px);
      margin: 0 auto;
    }
    @media (max-width: 600px) {
      .table-head-cols { display: none; }
      .td-label {
        width: 90px;
        min-width: 90px;
        padding: 18px 12px;
      }
      .td-input {
        padding: 12px 16px;
      }
      .pills {
        gap: 6px;
      }
      .pill {
        padding: 5px 10px;
        font-size: 11.5px;
      }
      .send-cell {
        gap: 12px;
      }
    }
    @media (max-width: 520px) {
      .page { width: min(calc(100% - 1.2rem), 1140px); padding-top: 0.7rem; }
    }
  </style>
</head>

  <script>
    const toast = document.getElementById("toast");
    const contactForm = document.getElementById("contactForm");
    const intentSelect = document.getElementById("intentSelect");
    const subjectInput = document.getElementById("subjectInput");
    const mailSubject = document.getElementById("mailSubject");
    const nextUrl = document.getElementById("nextUrl");
    const redirectUrl = document.getElementById("redirectUrl");
    const intentChips = Array.from(document.querySelectorAll(".pill"));
    const msgTextarea = document.getElementById("msg");
    const charCount = document.getElementById("cc");

    let toastTimer = null;
    function showToast(message) {
      if (!toast) return;
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => toast.classList.remove("show"), 3600);
    }

    function setIntent(intent) {
      if (intentSelect) intentSelect.value = intent;
      intentChips.forEach(chip => chip.classList.toggle("on", chip.dataset.intent === intent));
      if (subjectInput && !subjectInput.value.trim()) subjectInput.value = intent;
    }

    function setFormSending(isSending) {
      if (!contactForm) return;
      const sendButton = contactForm.querySelector(".send-btn");
      if (!sendButton) return;
      sendButton.disabled = isSending;
      sendButton.setAttribute("aria-busy", String(isSending));
    }

    intentChips.forEach(chip => chip.addEventListener("click", () => setIntent(chip.dataset.intent)));
    if (intentSelect) intentSelect.addEventListener("change", () => setIntent(intentSelect.value));

    if (msgTextarea && charCount) {
      msgTextarea.addEventListener("input", () => {
        charCount.textContent = `${msgTextarea.value.length} chars`;
      });
    }

    if (contactForm) {
      contactForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const subject = subjectInput?.value.trim() || "Portfolio contact";
        const intent = intentSelect?.value || "Contact";
        if (mailSubject) mailSubject.value = `[Portfolio: ${intent}] ${subject}`;
        const formData = new FormData(contactForm);
        const payload = Object.fromEntries(formData.entries());
        payload.subject = subject;
        payload.intent = intent;
        payload.honey = payload._honey || "";
        try {
          setFormSending(true);
          const response = await fetch(contactForm.action, {
            method: "POST",
            headers: {
              "content-type": "application/json",
              "accept": "application/json",
            },
            body: JSON.stringify(payload),
          });
          const result = await response.json().catch(() => ({}));
          if (!response.ok || result.ok === false) {
            const message = result.error || "Message not sent. Please try again.";
            showToast(message);
            return;
          }
          contactForm.reset();
          setIntent("Project collaboration");
          charCount.textContent = "0 chars";
          showToast("Message sent. I'll read it soon.");
        } catch (error) {
          showToast("Network issue. Please try again in a moment.");
        } finally {
          setFormSending(false);
        }
      });
    }
    if (nextUrl && window.location.protocol !== "file:") {
      const successPath = `${window.location.pathname}?sent=1`;
      nextUrl.value = `${window.location.origin}${successPath}`;
      if (redirectUrl) redirectUrl.value = successPath;
    }
    if (new URLSearchParams(window.location.search).get("sent") === "1") {
      showToast("Message sent. I'll read it soon.");
      window.history.replaceState({}, "", window.location.pathname);
    }
  </script>
  <script src="./js/app.js"></script>
  <script src="./js/lens.js"></script>
</body>
</html>
