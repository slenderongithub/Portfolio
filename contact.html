  <style>
    :root {
      --accent: #0a54e0;
      --accent-strong: #003bda;
      --accent-soft: rgba(10, 84, 224, 0.14);

      --form-bg: var(--xp-face);
      --form-border: var(--xp-face-lo);
      --form-label: #55606c;
      --form-text: #1b2530;
      --form-input-focus: rgba(10, 84, 224, 0.06);
      --form-pill-hover: rgba(10, 84, 224, 0.06);
      --form-pill-on: rgba(10, 84, 224, 0.14);
      --form-header-bg: rgba(0, 0, 0, 0.035);
      --btn-text: #ffffff;
    }
    /* Dark mode keeps the form as a navy-framed white window, so its
       interior palette matches the light theme (dark ink on white). */
    body.theme-midnight {
      --accent: #0a54e0;
      --accent-strong: #003bda;
      --accent-soft: rgba(10, 84, 224, 0.14);

      --form-label: #55606c;
      --form-text: #1b2530;
      --form-input-focus: rgba(10, 84, 224, 0.06);
      --form-pill-hover: rgba(10, 84, 224, 0.06);
      --form-pill-on: rgba(10, 84, 224, 0.14);
      --form-header-bg: rgba(0, 0, 0, 0.035);
      --btn-text: #ffffff;
    }

    .contact-shell {
      width: min(100%, var(--content-max, 1140px));
      margin: 0 auto;
      padding: clamp(2rem, 6vh, 5rem) 0;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: clamp(2rem, 5vw, 4rem);
      align-items: center;
      justify-content: start;
      width: 100%;
      min-height: calc(100vh - 12rem);
    }
    @media (max-width: 1080px) {
      .contact-grid {
        grid-template-columns: 1fr;
        gap: 2.5rem;
        min-height: auto;
      }
    }

    .contact-hero {
      text-align: left;
      align-self: center;
      display: flex;
      flex-direction: column;
    }
    .contact-hero h1 {
      font-family: var(--font-display);
      font-size: clamp(2.1rem, 4.6vw, 3.8rem);
      line-height: 1.08;
      font-weight: 700;
      letter-spacing: 0;
      color: #ffffff;
      text-shadow: 0 1px 0 rgba(0, 20, 60, 0.45), 1px 2px 5px rgba(0, 18, 55, 0.65);
      margin-bottom: 1.15rem;
    }
    .contact-hero h1 span { color: #ffd75e; text-shadow: 0 1px 0 rgba(60, 40, 0, 0.35), 1px 2px 5px rgba(30, 20, 0, 0.5); }
    .contact-desc {
      font-family: var(--font-body);
      font-size: 1.04rem;
      color: #f0f5ff;
      line-height: 1.72;
      max-width: 46ch;
      margin-bottom: 1.5rem;
      font-weight: 500;
      text-shadow: 0 1px 3px rgba(0, 15, 45, 0.5);
    }
    .contact-ctas {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 1.5rem;
      width: 292px;
      max-width: 100%;
    }
    .status-badge {
      margin: 0;
      width: 100%;
      justify-content: center;
      text-align: center;
      cursor: default;
      pointer-events: none;
      box-sizing: border-box;
    }
    .contact-grid-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.6rem;
      width: 100%;
    }
    .contact-grid-buttons .hero-cta {
      width: 100%;
      margin: 0;
      box-sizing: border-box;
    }

    /* Contact form as a Windows XP message window */
    .form-wrap {
      background: var(--xp-frame);
      border-radius: 8px 8px 0 0;
      padding: 0 3px 3px;
      box-shadow:
        inset -1px -1px #00138c, inset 1px 1px #0831d9,
        inset -2px -2px #001ea0, inset 2px 2px #166aee,
        inset -3px -3px #003bda, inset 3px 3px #0855dd,
        var(--shadow-card);
      width: 100%;
      overflow: visible;
    }
    body.theme-midnight .form-wrap {
      box-shadow:
        inset -1px -1px #0a1f52, inset 1px 1px #2b5cc0,
        inset -2px -2px #0c2a6b, inset 2px 2px #1f4fae,
        inset -3px -3px #123a86, inset 3px 3px #2a5fc0,
        var(--shadow-card);
    }

    .table-head {
      height: var(--xp-titlebar-h, 30px);
      padding: 0 4px 0 8px;
      background: var(--xp-title);
      border-radius: 6px 6px 0 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    body.theme-midnight .table-head { background: var(--xp-title, #2b313a); }
    .table-head-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-card-dots {
      display: inline-flex;
      width: 16px; height: 16px;
      align-items: center; justify-content: center;
      color: #ffffff;
    }
    .form-card-dots span { display: none; }
    .form-card-dots::before {
      content: "";
      width: 15px; height: 11px;
      border: 1.6px solid #fff; border-radius: 1px;
      background:
        linear-gradient(135deg, transparent 45%, #fff 45%, #fff 52%, transparent 52%) no-repeat 0 0 / 8px 6px;
    }
    .table-head-title {
      font-family: var(--font-title);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .01em;
      color: #ffffff;
      text-shadow: 1px 1px 1px rgba(0, 20, 80, 0.7);
    }
    /* Real XP min/max/close window buttons (.xp-titlebar-btns / .xp-tb-btn) come from styles.css */


    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--xp-face);
      border-radius: 0 0 5px 5px;
    }
    tr {
      border-bottom: 1px solid var(--form-border);
      transition: background .18s ease;
    }
    tr:last-child {
      border-bottom: none;
    }
    tr:focus-within {
      background: var(--form-input-focus);
    }

    .td-label {
      padding: 20px 20px 20px 24px;
      width: 130px;
      min-width: 130px;
      border-right: 1px solid var(--form-border);
      vertical-align: top;
      padding-top: 22px;
    }
    .td-label span {
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: none;
      color: var(--form-label);
      line-height: 1.6;
      display: block;
    }

    .td-input {
      padding: 16px 24px;
      vertical-align: middle;
    }


    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 2px 0;
    }
    .pill {
      padding: 5px 12px;
      border: 1px solid var(--xp-btn-border);
      border-radius: 3px;
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--form-text);
      background: var(--xp-btn);
      box-shadow: inset 1px 1px var(--xp-face-hi), inset -1px -1px var(--xp-groove-hi);
      cursor: pointer;
      transition: background 0.12s ease, border-color 0.12s ease;
    }
    .pill:hover { background: var(--xp-btn-hover); border-color: #e6960c; }
    .pill.on {
      border-color: #17399b;
      background: linear-gradient(180deg, #2f6fe6, #1a48c0);
      color: #ffffff; font-weight: 700;
      box-shadow: inset 1px 1px 2px rgba(0, 0, 25, 0.4);
    }


    input[type=text],
    input[type=email],
    textarea {
      width: 100%;
      outline: none;
      background: #ffffff;
      border: 1px solid #7f9db9;
      box-shadow: inset 1px 1px rgba(0, 0, 0, 0.14);
      border-radius: 2px;
      font-family: var(--font-ui);
      font-size: 14px;
      color: var(--form-text);
      caret-color: var(--accent);
      resize: none;
      line-height: 1.5;
      padding: 6px 8px;
    }
    body.theme-midnight input[type=text],
    body.theme-midnight input[type=email],
    body.theme-midnight textarea {
      background: #ffffff; border-color: var(--form-border);
    }
    input[type=text]:focus,
    input[type=email]:focus,
    textarea:focus { border-color: var(--accent); }
    input[type=text]::placeholder,
    input[type=email]::placeholder,
    textarea::placeholder {
      color: var(--muted);
      opacity: 0.7;
      font-size: 13.5px;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .hidden-honey {
      position: absolute;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }


    .send-row td {
      padding: 16px 20px 16px 24px;
      background: var(--form-header-bg);
      border-top: 1px solid var(--form-border);
    }
    .send-row .td-label span {
      color: var(--form-label);
      opacity: 0.5;
    }
    .send-cell {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
    }
    .char-count {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: .06em;
      opacity: 0.7;
    }
    .send-btn {
      padding: 8px 22px;
      background: var(--xp-btn);
      border: 1px solid var(--xp-btn-border);
      border-radius: 3px;
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
      color: var(--form-text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
      box-shadow: inset 1px 1px var(--xp-face-hi), inset -1px -1px var(--xp-groove-hi);
      transition: background .12s ease, border-color .12s ease;
    }
    .send-btn:hover { background: var(--xp-btn-hover); border-color: #e6960c; }
    .send-btn:active { box-shadow: inset -1px -1px var(--xp-face-hi), inset 1px 1px var(--xp-groove-hi); }
    .send-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.12);
      transform: translateX(-101%);
      transition: transform .38s ease;
    }
    .send-btn:hover::before {
      transform: translateX(0);
    }
    .arrow {
      font-family: sans-serif;
      font-size: 15px;
      transition: transform .2s ease;
    }
    .send-btn:hover .arrow {
      transform: translateX(4px);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 1.3rem;
      z-index: 20;
      transform: translate(-50%, 70px);
      opacity: 0;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #0b101a;
      color: #f8fafc;
      padding: 0.7rem 1rem;
      box-shadow: var(--shadow);
      font-size: 0.84rem;
      font-weight: 600;
      transition: transform 0.32s var(--ease), opacity 0.32s var(--ease);
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { transform: translate(-50%, 0); opacity: 1; }

    .page {
      width: min(calc(100% - 2.5rem), 1140px);
      margin: 0 auto;
    }
    @media (max-width: 600px) {
      .td-label {
        width: 90px;
        min-width: 90px;
        padding: 18px 12px;
      }
      .td-input {
        padding: 12px 16px;
      }
      .pills {
        gap: 6px;
      }
      .pill {
        padding: 5px 10px;
        font-size: 11.5px;
      }
      .send-cell {
        gap: 12px;
      }
    }
    @media (max-width: 520px) {
      .page { width: min(calc(100% - 1.2rem), 1140px); padding-top: 0.7rem; }
    }
  </style>
</head>

  <script>
    const toast = document.getElementById("toast");
    const contactForm = document.getElementById("contactForm");
    const intentSelect = document.getElementById("intentSelect");
    const subjectInput = document.getElementById("subjectInput");
    const mailSubject = document.getElementById("mailSubject");
    const nextUrl = document.getElementById("nextUrl");
    const redirectUrl = document.getElementById("redirectUrl");
    const intentChips = Array.from(document.querySelectorAll(".pill"));
    const msgTextarea = document.getElementById("msg");
    const charCount = document.getElementById("cc");

    let toastTimer = null;
    function showToast(message) {
      if (!toast) return;
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => toast.classList.remove("show"), 3600);
    }

    function setIntent(intent) {
      if (intentSelect) intentSelect.value = intent;
      intentChips.forEach(chip => chip.classList.toggle("on", chip.dataset.intent === intent));
      if (subjectInput && !subjectInput.value.trim()) subjectInput.value = intent;
    }

    function setFormSending(isSending) {
      if (!contactForm) return;
      const sendButton = contactForm.querySelector(".send-btn");
      if (!sendButton) return;
      sendButton.disabled = isSending;
      sendButton.setAttribute("aria-busy", String(isSending));
    }

    intentChips.forEach(chip => chip.addEventListener("click", () => setIntent(chip.dataset.intent)));
    if (intentSelect) intentSelect.addEventListener("change", () => setIntent(intentSelect.value));

    if (msgTextarea && charCount) {
      msgTextarea.addEventListener("input", () => {
        charCount.textContent = `${msgTextarea.value.length} chars`;
      });
    }

    if (contactForm) {
      contactForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const subject = subjectInput?.value.trim() || "Portfolio contact";
        const intent = intentSelect?.value || "Contact";
        if (mailSubject) mailSubject.value = `[Portfolio: ${intent}] ${subject}`;
        const formData = new FormData(contactForm);
        const payload = Object.fromEntries(formData.entries());
        payload.subject = subject;
        payload.intent = intent;
        payload.honey = payload._honey || "";
        try {
          setFormSending(true);
          const response = await fetch(contactForm.action, {
            method: "POST",
            headers: {
              "content-type": "application/json",
              "accept": "application/json",
            },
            body: JSON.stringify(payload),
          });
          const result = await response.json().catch(() => ({}));
          if (!response.ok || result.ok === false) {
            const message = result.error || "Message not sent. Please try again.";
            showToast(message);
            return;
          }
          contactForm.reset();
          setIntent("Project collaboration");
          charCount.textContent = "0 chars";
          showToast("Message sent. I'll read it soon.");
        } catch (error) {
          showToast("Network issue. Please try again in a moment.");
        } finally {
          setFormSending(false);
        }
      });
    }
    if (nextUrl && window.location.protocol !== "file:") {
      const successPath = `${window.location.pathname}?sent=1`;
      nextUrl.value = `${window.location.origin}${successPath}`;
      if (redirectUrl) redirectUrl.value = successPath;
    }
    if (new URLSearchParams(window.location.search).get("sent") === "1") {
      showToast("Message sent. I'll read it soon.");
      window.history.replaceState({}, "", window.location.pathname);
    }
  </script>
  <script src="./js/ransom.js"></script>
  <script src="./js/sounds.js"></script>
  <script src="./js/app.js"></script>
  <script src="./js/lens.js"></script>
  <script src="./js/error-windows.js"></script>
</body>
</html>
