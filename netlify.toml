# ─────────────────────────────────────────────
# Netlify configuration for Shubhadeep's portfolio
# ─────────────────────────────────────────────

[build]
  # Static site — no build command needed.
  publish = "."
  functions = "netlify/functions"

[functions]
  # Use Node 20 for all serverless functions.
  node_bundler = "esbuild"

  [functions.contact]
    node_bundler = "esbuild"

# ── Redirects ──────────────────────────────
# Make /.netlify/functions/contact accessible
# at a cleaner path as well.
[[redirects]]
  from   = "/api/contact"
  to     = "/.netlify/functions/contact"
  status = 200

# ── Security headers (applied site-wide) ───
[[headers]]
  for = "/*"

  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

    # Content Security Policy — kept permissive for:
    #  • Google Fonts (style-src, font-src)
    #  • Razorpay checkout SDK (script-src, frame-src)
    #  • devicons CDN (script-src for jsdelivr)
    #  • Three.js CDN import (script-src)
    #  • Resend / FormSubmit (connect-src via functions)
    Content-Security-Policy = """
      default-src 'self';
      script-src  'self' 'unsafe-inline'
                  https://checkout.razorpay.com
                  https://cdn.jsdelivr.net
                  https://cdn.jsdelivr.net/npm/three@0.160.0/;
      style-src   'self' 'unsafe-inline'
                  https://fonts.googleapis.com
                  https://cdn.jsdelivr.net;
      font-src    'self'
                  https://fonts.gstatic.com
                  https://cdn.jsdelivr.net;
      img-src     'self' data: https:;
      connect-src 'self'
                  https://api.github.com
                  https://api.resend.com
                  https://formsubmit.co
                  https://api.razorpay.com;
      frame-src   https://api.razorpay.com
                  https://checkout.razorpay.com;
      object-src  'none';
      base-uri    'self';
    """
